steps:
  # 1. Rakennetaan Docker-image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'europe-north1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/lts-str-webapp:$COMMIT_SHA', 
      '.'
    ]

  # 2. Työnnetään image Artifact Registryyn
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'europe-north1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/lts-str-webapp:$COMMIT_SHA'
    ]

  # 3. Julkaistaan image Cloud Run -palveluun lts-str-webapp
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'lts-str-webapp'
      - '--image'
      - 'europe-north1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/lts-str-webapp:$COMMIT_SHA'
      - '--region'
      - 'europe-north1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'europe-north1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/lts-str-webapp:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
